<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Redirigiendo...</title>
<script>
  // Redirige siempre con un parametro de version distinto (timestamp) para
  // forzar que el navegador y el CDN de GitHub Pages traigan la copia mas
  // reciente del dashboard, en vez de servir una version en cache (GitHub
  // Pages cachea el HTML hasta 10 minutos por defecto y no permite cambiar
  // ese header, asi que la unica forma confiable de evitarlo es pedir una
  // URL distinta cada vez).
  location.replace('Farmatodo_NOC_Firebase.html?v=' + Date.now());
</script>
</head>
<body>
<p>Redirigiendo al dashboard... si no avanza automáticamente, <a href="Farmatodo_NOC_Firebase.html">haz clic aquí</a>.</p>
</body>
</html>
